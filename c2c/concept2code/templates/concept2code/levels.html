<!DOCTYPE html>
<html>
<head>
  <title>Levels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Choose Level</h2>

  <div class="row">
    {% for level in levels %}
      <div class="col-md-4 mb-3">
        <a href="/levels/{{ level.id }}/topics/" class="text-decoration-none">
          <div class="card shadow-sm text-center p-4">
            <h4>{{ level.name }}</h4>
          </div>
        </a>
      </div>
    {% endfor %}
  </div>
</div>

</body>
</html>
