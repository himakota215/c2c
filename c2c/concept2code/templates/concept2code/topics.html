<!DOCTYPE html>
<html>
<head>
  <title>Topics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

<h3 class="mb-4">{{ level.name }} Topics</h3>

<div class="row">
  {% for topic in topics %}
    <div class="col-md-4 mb-3">
      <a href="/topics/{{ topic.id }}/tasks/" class="text-decoration-none">
        <div class="card shadow-sm p-3 text-center">
          <h5>{{ topic.name }}</h5>
        </div>
      </a>
    </div>
  {% endfor %}
</div>

<a href="/levels/" class="btn btn-secondary mt-3">⬅ Back</a>

</div>
</body>
</html>
