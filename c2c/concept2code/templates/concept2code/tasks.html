<!DOCTYPE html>
<html>
<head>
  <title>Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

<h3 class="mb-4">Tasks – {{ topic.name }}</h3>

{% for task in tasks %}
  <div class="card mb-3 shadow-sm p-3">
    <h5>
      <a href="/tasks/{{ task.id }}/" class="text-decoration-none">
        {{ task.title }}
      </a>
    </h5>
    <p class="text-muted">{{ task.description|truncatewords:20 }}</p>
  </div>
{% endfor %}

<div class="mt-3">
  {% if tasks.has_previous %}
    <a class="btn btn-outline-primary" href="?page={{ tasks.previous_page_number }}">Previous</a>
  {% endif %}

  <span class="mx-2">Page {{ tasks.number }} of {{ tasks.paginator.num_pages }}</span>

  {% if tasks.has_next %}
    <a class="btn btn-outline-primary" href="?page={{ tasks.next_page_number }}">Next</a>
  {% endif %}
</div>

<br>
<a href="/levels/{{ topic.level.id }}/topics/" class="btn btn-secondary">⬅ Back</a>

</div>
</body>
</html>
